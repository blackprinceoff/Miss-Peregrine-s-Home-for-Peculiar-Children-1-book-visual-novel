<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="30%" stop-color="#0e1020"/>
      <stop offset="55%" stop-color="#14182a"/>
      <stop offset="80%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#06060a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="75%" cy="12%" r="35%">
      <stop offset="0%" stop-color="#d0d8e0" stop-opacity="0.12"/>
      <stop offset="20%" stop-color="#a0b0c0" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#808090" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#808090" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonHalo" cx="75%" cy="12%" r="12%">
      <stop offset="0%" stop-color="#e0e8f0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#c0c8d8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c0c8d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1018"/>
      <stop offset="100%" stop-color="#08080c"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="100%" stop-color="#020204"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="720" fill="url(#nightSky)"/>
  <rect width="1280" height="720" fill="url(#moonGlow)"/>

  <!-- Stars -->
  <circle cx="120" cy="45" r="1.2" fill="#d0d8e0" opacity="0.6"/>
  <circle cx="230" cy="80" r="0.8" fill="#d0d8e0" opacity="0.4"/>
  <circle cx="340" cy="30" r="1.5" fill="#e0e8f0" opacity="0.7"/>
  <circle cx="450" cy="65" r="0.7" fill="#d0d8e0" opacity="0.3"/>
  <circle cx="560" cy="40" r="1" fill="#d0d8e0" opacity="0.5"/>
  <circle cx="180" cy="120" r="0.6" fill="#d0d8e0" opacity="0.3"/>
  <circle cx="90" cy="95" r="0.9" fill="#d0d8e0" opacity="0.4"/>
  <circle cx="680" cy="55" r="1.1" fill="#d0d8e0" opacity="0.5"/>
  <circle cx="800" cy="35" r="0.8" fill="#d0d8e0" opacity="0.4"/>
  <circle cx="920" cy="70" r="1.3" fill="#e0e8f0" opacity="0.6"/>
  <circle cx="1050" cy="45" r="0.7" fill="#d0d8e0" opacity="0.3"/>
  <circle cx="1150" cy="90" r="1" fill="#d0d8e0" opacity="0.5"/>
  <circle cx="1250" cy="50" r="0.9" fill="#d0d8e0" opacity="0.4"/>
  <circle cx="300" cy="110" r="0.5" fill="#d0d8e0" opacity="0.25"/>
  <circle cx="500" cy="100" r="0.8" fill="#d0d8e0" opacity="0.3"/>
  <circle cx="750" cy="75" r="0.6" fill="#d0d8e0" opacity="0.25"/>
  <circle cx="880" cy="105" r="0.7" fill="#d0d8e0" opacity="0.3"/>
  <circle cx="1000" cy="25" r="1.2" fill="#e0e8f0" opacity="0.5"/>
  <circle cx="60" cy="150" r="0.6" fill="#d0d8e0" opacity="0.2"/>
  <circle cx="400" cy="140" r="0.5" fill="#d0d8e0" opacity="0.2"/>
  <circle cx="1100" cy="120" r="0.8" fill="#d0d8e0" opacity="0.25"/>
  <circle cx="130" cy="170" r="0.5" fill="#d0d8e0" opacity="0.15"/>
  <circle cx="970" cy="135" r="0.6" fill="#d0d8e0" opacity="0.2"/>

  <!-- Twinkling stars -->
  <circle cx="340" cy="30" r="1.5" fill="#e0e8f0" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="920" cy="70" r="1.3" fill="#e0e8f0" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="40" r="1" fill="#d0d8e0" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Moon -->
  <circle cx="960" cy="85" r="40" fill="#e0e8f0" opacity="0.9"/>
  <circle cx="960" cy="85" r="38" fill="#d8e0ec"/>
  <!-- Moon craters -->
  <circle cx="950" cy="75" r="6" fill="#c0c8d8" opacity="0.5"/>
  <circle cx="972" cy="80" r="4" fill="#c0c8d8" opacity="0.4"/>
  <circle cx="955" cy="95" r="5" fill="#c0c8d8" opacity="0.3"/>
  <circle cx="968" cy="92" r="3" fill="#c0c8d8" opacity="0.35"/>
  <circle cx="944" cy="90" r="2.5" fill="#c0c8d8" opacity="0.3"/>
  <circle cx="958" cy="72" r="2" fill="#c0c8d8" opacity="0.25"/>
  <!-- Moon halo -->
  <rect width="1280" height="720" fill="url(#moonHalo)"/>

  <!-- Distant hills -->
  <path d="M0,320 Q100,280 250,300 Q400,320 550,290 Q700,260 850,295 Q1000,330 1150,285 Q1250,260 1280,275 L1280,720 L0,720 Z" fill="url(#hill)"/>

  <!-- Second hill layer -->
  <path d="M0,380 Q150,350 300,370 Q450,390 600,355 Q750,320 900,360 Q1050,400 1200,350 Q1280,335 1280,380 L1280,720 L0,720 Z" fill="#06060a" opacity="0.8"/>

  <!-- Ground foreground -->
  <rect x="0" y="480" width="1280" height="240" fill="url(#ground)"/>

  <!-- Tree silhouette 1 (far left) -->
  <path d="M60,180 Q65,280 55,380 Q50,440 45,520" stroke="#020204" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M60,180 Q40,155 20,145" stroke="#020204" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M60,180 Q80,160 100,155" stroke="#020204" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M58,260 Q35,245 20,250" stroke="#020204" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M55,340 Q75,330 90,335" stroke="#020204" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tree silhouette 2 (center-left) -->
  <path d="M300,150 Q295,240 305,330 Q310,430 300,520" stroke="#020204" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M300,150 Q275,125 250,115" stroke="#020204" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M300,150 Q325,130 350,125" stroke="#020204" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M298,230 Q270,215 255,220" stroke="#020204" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M305,320 Q330,310 345,315" stroke="#020204" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M307,410 Q280,400 270,405" stroke="#020204" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tree silhouette 3 (center-right) -->
  <path d="M700,120 Q695,220 705,330 Q710,440 700,530" stroke="#020204" stroke-width="24" fill="none" stroke-linecap="round"/>
  <path d="M700,120 Q670,95 640,85" stroke="#020204" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M700,120 Q730,100 760,95" stroke="#020204" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M697,210 Q660,195 640,200" stroke="#020204" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M705,310 Q740,295 760,305" stroke="#020204" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M708,400 Q670,385 655,395" stroke="#020204" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Tree silhouette 4 (far right) -->
  <path d="M1100,160 Q1095,260 1105,360 Q1110,460 1100,540" stroke="#020204" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M1100,160 Q1070,135 1045,125" stroke="#020204" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M1100,160 Q1125,140 1150,135" stroke="#020204" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M1097,250 Q1065,240 1050,245" stroke="#020204" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M1105,340 Q1135,330 1150,340" stroke="#020204" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Small bush silhouettes -->
  <ellipse cx="150" cy="500" rx="35" ry="15" fill="#020204"/>
  <ellipse cx="450" cy="510" rx="40" ry="18" fill="#020204"/>
  <ellipse cx="620" cy="505" rx="30" ry="14" fill="#020204"/>
  <ellipse cx="850" cy="500" rx="45" ry="20" fill="#020204"/>
  <ellipse cx="1050" cy="510" rx="35" ry="16" fill="#020204"/>
  <ellipse cx="1200" cy="505" rx="30" ry="14" fill="#020204"/>

  <!-- Foreground grass -->
  <line x1="20" y1="720" x2="15" y2="690" stroke="#020204" stroke-width="2.5"/>
  <line x1="50" y1="720" x2="48" y2="695" stroke="#020204" stroke-width="2"/>
  <line x1="200" y1="720" x2="195" y2="692" stroke="#020204" stroke-width="2.5"/>
  <line x1="230" y1="720" x2="228" y2="698" stroke="#020204" stroke-width="1.5"/>
  <line x1="500" y1="720" x2="495" y2="690" stroke="#020204" stroke-width="2.5"/>
  <line x1="530" y1="720" x2="528" y2="695" stroke="#020204" stroke-width="1.5"/>
  <line x1="800" y1="720" x2="795" y2="692" stroke="#020204" stroke-width="2.5"/>
  <line x1="830" y1="720" x2="828" y2="698" stroke="#020204" stroke-width="1.5"/>
  <line x1="1100" y1="720" x2="1095" y2="690" stroke="#020204" stroke-width="2.5"/>
  <line x1="1200" y1="720" x2="1198" y2="695" stroke="#020204" stroke-width="2"/>

  <!-- Fireflies / ambient particles -->
  <circle cx="250" cy="420" r="1.5" fill="#c0d060" opacity="0.08"/>
  <circle cx="650" cy="440" r="1.2" fill="#c0d060" opacity="0.06"/>
  <circle cx="850" cy="460" r="1.8" fill="#c0d060" opacity="0.07"/>
  <circle cx="400" cy="480" r="1" fill="#c0d060" opacity="0.05"/>
  <circle cx="1000" cy="430" r="1.3" fill="#c0d060" opacity="0.06"/>
</svg>
