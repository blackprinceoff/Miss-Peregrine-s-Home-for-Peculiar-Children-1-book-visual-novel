<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1814"/>
      <stop offset="100%" stop-color="#14100c"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12100e"/>
      <stop offset="100%" stop-color="#080806"/>
    </linearGradient>
    <radialGradient id="ceilingLight" cx="50%" cy="5%" r="40%">
      <stop offset="0%" stop-color="#b0a878" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#b0a878" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#b0a878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vendingGlow" cx="85%" cy="55%" r="20%">
      <stop offset="0%" stop-color="#4070a0" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#305880" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#305880" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tableTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1e14"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="1280" height="560" fill="url(#wall)"/>

  <!-- Ceiling light cone -->
  <rect width="1280" height="720" fill="url(#ceilingLight)"/>

  <!-- Ceiling light fixture -->
  <rect x="580" y="10" width="120" height="16" rx="2" fill="#3a3428"/>
  <rect x="585" y="12" width="110" height="12" rx="1" fill="#c8c098" opacity="0.2"/>
  <rect x="590" y="14" width="100" height="8" rx="1" fill="#e0d8b0" opacity="0.15"/>

  <!-- Wall poster / noticeboard -->
  <rect x="350" y="140" width="200" height="160" rx="2" fill="#1a1410"/>
  <rect x="350" y="140" width="200" height="160" rx="2" fill="none" stroke="#2a1e14" stroke-width="2"/>
  <rect x="358" y="148" width="184" height="144" fill="#1e1814"/>
  <!-- Pinned papers -->
  <rect x="370" y="160" width="60" height="50" rx="1" fill="#3a2a1a" opacity="0.3" transform="rotate(-3,370,160)"/>
  <rect x="450" y="175" width="55" height="45" rx="1" fill="#3a2a1a" opacity="0.25" transform="rotate(2,450,175)"/>
  <rect x="390" y="230" width="65" height="40" rx="1" fill="#3a2a1a" opacity="0.2" transform="rotate(-1,390,230)"/>
  <!-- Pushpins -->
  <circle cx="375" cy="165" r="2" fill="#4a3a28" opacity="0.4"/>
  <circle cx="455" cy="180" r="2" fill="#4a3a28" opacity="0.4"/>
  <circle cx="395" cy="235" r="2" fill="#4a3a28" opacity="0.4"/>

  <!-- Schedule on wall -->
  <rect x="600" y="130" width="100" height="140" rx="1" fill="#1a1410"/>
  <rect x="600" y="130" width="100" height="140" rx="1" fill="none" stroke="#2a1e14" stroke-width="1"/>
  <line x1="600" y1="150" x2="700" y2="150" stroke="#2a1e14" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="170" x2="700" y2="170" stroke="#2a1e14" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="190" x2="700" y2="190" stroke="#2a1e14" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="210" x2="700" y2="210" stroke="#2a1e14" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="230" x2="700" y2="230" stroke="#2a1e14" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="250" x2="700" y2="250" stroke="#2a1e14" stroke-width="0.5" opacity="0.3"/>
  <rect x="620" y="153" width="20" height="15" rx="1" fill="#c8b080" opacity="0.06"/>
  <rect x="660" y="173" width="20" height="15" rx="1" fill="#c8b080" opacity="0.06"/>

  <!-- Table -->
  <rect x="300" y="400" width="400" height="16" rx="3" fill="url(#tableTop)"/>
  <rect x="300" y="400" width="400" height="16" rx="3" fill="none" stroke="#1a1008" stroke-width="1"/>
  <!-- Table legs -->
  <rect x="305" y="416" width="8" height="160" fill="#1a0e06"/>
  <rect x="687" y="416" width="8" height="160" fill="#1a0e06"/>

  <!-- Clutter on table -->
  <!-- Coffee mug -->
  <rect x="420" y="382" width="18" height="18" rx="2" fill="#3a2a1a"/>
  <ellipse cx="429" cy="382" rx="9" ry="3" fill="#2a1a0e"/>
  <ellipse cx="429" cy="382" rx="6" ry="2" fill="#1a0e06"/>
  <!-- Mug handle -->
  <path d="M438,386 Q444,386 444,392 Q444,398 438,398" fill="none" stroke="#3a2a1a" stroke-width="2"/>
  <!-- Papers on table -->
  <rect x="520" y="388" width="70" height="12" rx="1" fill="#3a2a1a" opacity="0.3" transform="rotate(-5,520,388)"/>
  <rect x="540" y="390" width="60" height="10" rx="1" fill="#3a2a1a" opacity="0.2" transform="rotate(2,540,390)"/>
  <!-- Pen -->
  <line x1="470" y1="400" x2="510" y2="395" stroke="#4a3a28" stroke-width="2" stroke-linecap="round"/>
  <!-- Ashtray -->
  <ellipse cx="360" cy="398" rx="14" ry="4" fill="#2a1a0e"/>
  <ellipse cx="360" cy="397" rx="11" ry="3" fill="#1a0e06"/>

  <!-- Vending machine -->
  <rect x="1050" y="160" width="140" height="300" rx="4" fill="#1a1e24"/>
  <rect x="1050" y="160" width="140" height="300" rx="4" fill="none" stroke="#282e34" stroke-width="2"/>
  <rect x="1054" y="164" width="132" height="220" rx="2" fill="#182028"/>
  <!-- Vending glass -->
  <rect x="1060" y="168" width="120" height="210" rx="1" fill="#203040" opacity="0.4"/>
  <!-- Vending glow -->
  <rect width="1280" height="720" fill="url(#vendingGlow)"/>
  <!-- Vending shelves -->
  <line x1="1058" y1="210" x2="1182" y2="210" stroke="#282e34" stroke-width="1"/>
  <line x1="1058" y1="260" x2="1182" y2="260" stroke="#282e34" stroke-width="1"/>
  <line x1="1058" y1="310" x2="1182" y2="310" stroke="#282e34" stroke-width="1"/>
  <line x1="1058" y1="360" x2="1182" y2="360" stroke="#282e34" stroke-width="1"/>
  <!-- Cans in vending -->
  <rect x="1064" y="174" width="14" height="32" rx="2" fill="#3a2840" opacity="0.5"/>
  <rect x="1082" y="174" width="14" height="32" rx="2" fill="#28403a" opacity="0.5"/>
  <rect x="1100" y="174" width="14" height="32" rx="2" fill="#403028" opacity="0.5"/>
  <rect x="1064" y="218" width="14" height="38" rx="2" fill="#403a28" opacity="0.5"/>
  <rect x="1082" y="218" width="14" height="38" rx="2" fill="#284028" opacity="0.5"/>
  <rect x="1100" y="218" width="14" height="38" rx="2" fill="#3a2840" opacity="0.5"/>
  <rect x="1064" y="268" width="14" height="38" rx="2" fill="#284040" opacity="0.5"/>
  <rect x="1082" y="268" width="14" height="38" rx="2" fill="#402830" opacity="0.5"/>
  <!-- Coin slot -->
  <rect x="1090" y="395" width="20" height="30" rx="2" fill="#2a3038"/>
  <rect x="1096" y="400" width="8" height="4" rx="1" fill="#1a2028"/>
  <!-- Select buttons -->
  <rect x="1064" y="400" width="12" height="12" rx="1" fill="#2a3038"/>
  <rect x="1082" y="400" width="12" height="12" rx="1" fill="#2a3038"/>
  <!-- Dispenser slot -->
  <rect x="1060" y="435" width="120" height="12" rx="2" fill="#1a1e24"/>
  <rect x="1060" y="435" width="120" height="12" rx="2" fill="none" stroke="#282e34" stroke-width="1"/>
  <!-- Vending light strip -->
  <rect x="1054" y="450" width="132" height="8" rx="1" fill="#284060" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.15;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Floor -->
  <rect x="0" y="560" width="1280" height="160" fill="url(#floor)"/>

  <!-- Floor wear marks -->
  <line x1="200" y1="600" x2="600" y2="600" stroke="#0a0a08" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="640" x2="800" y2="640" stroke="#0a0a08" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="680" x2="900" y2="680" stroke="#0a0a08" stroke-width="0.5" opacity="0.2"/>

  <!-- Baseboard -->
  <rect x="0" y="558" width="1280" height="4" fill="#1a0e06"/>

  <!-- Pipe on ceiling -->
  <rect x="0" y="40" width="1280" height="6" fill="#1a1410" opacity="0.5"/>
  <rect x="400" y="40" width="6" height="40" fill="#1a1410" opacity="0.5"/>

  <!-- Wall-mounted phone -->
  <rect x="180" y="240" width="30" height="60" rx="3" fill="#2a1a0e"/>
  <rect x="180" y="240" width="30" height="10" rx="2" fill="#3a2a18"/>
  <rect x="190" y="250" width="10" height="20" rx="2" fill="#1a0e06"/>
  <!-- Phone cord -->
  <path d="M180,270 Q150,280 160,310 Q170,340 150,350" fill="none" stroke="#1a0e06" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Phone receiver -->
  <rect x="186" y="235" width="18" height="8" rx="3" fill="#3a2a18"/>

  <!-- Stool under table -->
  <rect x="460" y="490" width="6" height="80" fill="#1a0e06"/>
  <rect x="530" y="490" width="6" height="80" fill="#1a0e06"/>
  <rect x="460" y="490" width="76" height="6" rx="2" fill="#2a1a0e"/>

  <!-- Shadow under table -->
  <ellipse cx="500" cy="580" rx="200" ry="10" fill="#0a0806" opacity="0.3"/>

  <!-- Ventilation grate on wall -->
  <rect x="100" y="400" width="60" height="30" rx="2" fill="#1a1410"/>
  <rect x="100" y="400" width="60" height="30" rx="2" fill="none" stroke="#2a1e14" stroke-width="1"/>
  <line x1="100" y1="408" x2="160" y2="408" stroke="#2a1e14" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="416" x2="160" y2="416" stroke="#2a1e14" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="424" x2="160" y2="424" stroke="#2a1e14" stroke-width="0.5" opacity="0.4"/>
</svg>