<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500">
  <rect width="200" height="500" fill="transparent"/>
  <!-- Лисина / сиве волосся -->
  <ellipse cx="100" cy="55" rx="35" ry="40" fill="#d0d0d0"/>
  <ellipse cx="100" cy="40" rx="28" ry="22" fill="#b8b8b8"/>
  <ellipse cx="80" cy="38" rx="10" ry="6" fill="#b8b8b8"/>
  <ellipse cx="120" cy="38" rx="10" ry="6" fill="#b8b8b8"/>
  <!-- Бічне волосся -->
  <ellipse cx="70" cy="58" rx="10" ry="22" fill="#d0d0d0"/>
  <ellipse cx="130" cy="58" rx="10" ry="22" fill="#d0d0d0"/>
  <!-- Обличчя -->
  <ellipse cx="100" cy="78" rx="34" ry="38" fill="#b89880"/>
  <!-- Зморшки на лобі -->
  <line x1="80" y1="50" x2="120" y2="50" stroke="#a08070" stroke-width="0.6"/>
  <line x1="82" y1="53" x2="118" y2="53" stroke="#a08070" stroke-width="0.6"/>
  <!-- Окуляри -->
  <circle cx="86" cy="72" r="12" fill="none" stroke="#4a3a28" stroke-width="1.5"/>
  <circle cx="114" cy="72" r="12" fill="none" stroke="#4a3a28" stroke-width="1.5"/>
  <line x1="98" y1="72" x2="102" y2="72" stroke="#4a3a28" stroke-width="1.2"/>
  <line x1="74" y1="70" x2="62" y2="66" stroke="#4a3a28" stroke-width="1"/>
  <line x1="126" y1="70" x2="138" y2="66" stroke="#4a3a28" stroke-width="1"/>
  <!-- Очі за окулярами -->
  <ellipse cx="86" cy="72" rx="3" ry="3" fill="#2a1a10"/>
  <ellipse cx="114" cy="72" rx="3" ry="3" fill="#2a1a10"/>
  <circle cx="86" cy="72" r="1" fill="#c8b898"/>
  <circle cx="114" cy="72" r="1" fill="#c8b898"/>
  <!-- Брови -->
  <line x1="78" y1="58" x2="94" y2="56" stroke="#4a3a28" stroke-width="1.5"/>
  <line x1="122" y1="58" x2="106" y2="56" stroke="#4a3a28" stroke-width="1.5"/>
  <!-- Ніс -->
  <ellipse cx="100" cy="84" rx="3" ry="5" fill="#a08070"/>
  <!-- Рот -->
  <line x1="88" y1="98" x2="112" y2="98" stroke="#6a5040" stroke-width="1.2"/>
  <!-- Підборіддя зморшки -->
  <line x1="90" y1="105" x2="110" y2="105" stroke="#a08070" stroke-width="0.5"/>
  <!-- Шия -->
  <rect x="90" y="114" width="20" height="18" fill="#b89880"/>
  <!-- Жилет -->
  <rect x="68" y="130" width="64" height="170" rx="4" fill="#2a2a3a"/>
  <polygon points="90,130 100,160 110,130" fill="#1a1a2a"/>
  <!-- Сорочка під жилетом -->
  <rect x="90" y="130" width="20" height="20" fill="#e0d8cc"/>
  <!-- Комірець -->
  <polygon points="92,130 100,142 108,130" fill="#e0d8cc"/>
  <!-- Краватка -->
  <rect x="96" y="142" width="8" height="40" fill="#3a1a1a"/>
  <!-- Штани -->
  <rect x="70" y="300" width="24" height="100" rx="3" fill="#1a1a2e"/>
  <rect x="106" y="300" width="24" height="100" rx="3" fill="#1a1a2e"/>
  <!-- Черевики -->
  <rect x="68" y="400" width="28" height="16" rx="5" fill="#0a0a0a"/>
  <rect x="104" y="400" width="28" height="16" rx="5" fill="#0a0a0a"/>
  <!-- Руки -->
  <rect x="40" y="145" width="28" height="110" rx="10" fill="#b89880"/>
  <rect x="132" y="145" width="28" height="110" rx="10" fill="#b89880"/>
  <!-- Рукава піджака -->
  <rect x="38" y="145" width="30" height="20" rx="4" fill="#2a2a3a"/>
  <rect x="132" y="145" width="30" height="20" rx="4" fill="#2a2a3a"/>
  <!-- Кисті -->
  <circle cx="54" cy="258" r="9" fill="#b89880"/>
  <circle cx="146" cy="258" r="9" fill="#b89880"/>
  <!-- Пальці -->
  <line x1="50" y1="258" x2="44" y2="252" stroke="#b89880" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="258" x2="52" y2="250" stroke="#b89880" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="258" x2="60" y2="250" stroke="#b89880" stroke-width="3" stroke-linecap="round"/>
</svg>
